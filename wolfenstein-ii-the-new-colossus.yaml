name: Wolfenstein - II - The New Colossus
game_slug: wolfenstein-ii-the-new-colossus
version: Good Old Games Installer
slug: wolfenstein-ii-the-new-colossus
runner: wine
year: 2017

script:
  files:
    - setup: N/A:Select setup file from GOG
    - DLC1: N/A:Select DLC1 file from GOG

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/Wolfenstein II The New Colossus/Launch Wolfenstein II - The New Colossus.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
    # Link $DLC1 folder to Prefix DLC folder
    - execute:
        command: 'src_path=$(echo "$DLC1" | sed -r "s/(.+)\/.+/\1/");


                  ln -s -f -n "$src_path" "$GAMEDIR/drive_c/DLC"
                  '

    # DLC Mass Installer
    - write_file: 
        content: '@echo off

          REM Set the directory where the .exe files are located
                   
          C: 
          
          set FullPath="c:\dlc"

          echo %FullPath%

          REM Change to the specified directory

          cd /d %FullPath%

          REM Loop through each .exe file in the directory and run it with the /SILENT flag

          for %%f in (*.exe) do (
                
            start /wait "" "%%f" /SILENT

           )
         '
        file: $GAMEDIR/dlc_install.cmd

    - task:
        executable: $GAMEDIR/dlc_install.cmd
        name: wineexec
        prefix: $GAMEDIR
