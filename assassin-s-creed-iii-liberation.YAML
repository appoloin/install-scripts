name: Assassin's Creed III - Liberation
game_slug: assassin-s-creed-iii-liberation
version: Windows Installer
slug: assassin-s-creed-iii-liberation
runner: wine
year: 2012

script:
  game:
    exe: $GAMEDIR/drive_c/Program Files (x86)/Ubisoft/Assassin's Creed Liberation HD/ac3lhd_32.exe
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select installer
    - patch:  
        url: https://github.com/appoloin/Patches/raw/refs/heads/master/OtherGames/AssassinsCreed-Liberation.7z
        filename: AssassinsCreed-Liberation.7z

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        app: tahoma vcrun2008 vcrun2010
        description: Installing DirectX dlls
        name: winetricks
        prefix: $GAMEDIR

    - write_file:
        content: "overlay: \n  enabled: false\n"
        file: $GAMEDIR/pfx/drive_c/users/$USER/Local Settings/Application Data/Ubisoft Game Launcher/settings.yml

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
        return_code: 9

    - extract:  
        file: $patch
        dst:  $GAMEDIR/pfx/drive_c/Program Files (x86)/Ubisoft/Assassin's Creed Liberation HD/

