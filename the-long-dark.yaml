name: The Long Dark
game_slug: the-long-dark
version: Good Old Games Installer
slug: the-long-dark
runner: wine
year: 2017

script:
  files:
    - setup: N/A:Select setup file from GOG
    - DLC1: N/A:Select DLC1 installer
    - DLC2: N/A:Select DLC2 installer

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/TheLongDark/Launch The Long Dark.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
    - task:
        executable: $DLC1
        name: wineexec
        args: /SILENT 
        prefix: $GAMEDIR
    - task:
        executable: $DLC2
        name: wineexec
        args: /SILENT 
        prefix: $GAMEDIR
