name: Halo - the Master Chief Collection
game_slug: halo-the-master-chief-collection
version: Windows Games Installer
slug: halo-the-master-chief-collection
runner: wine
year: 2019

script:
  game:
    exe: $GAMEDIR/drive_c/Games/Halo The Master Chief Collection/mcclauncher.exe
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the Game installer
    - patch:  N/A:Select the Patch installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
  
    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

    - task:
        executable: $patch
        name: wineexec
        prefix: $GAMEDIR