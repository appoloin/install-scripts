runner: wine
year: 2017
 
script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/X-Morph Defense Complete Edition/Launch X-Morph - Defense Complete Edition.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer

