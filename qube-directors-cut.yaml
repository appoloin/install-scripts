name: Q.U.B.E 
game_slug: qube-directors-cut
version: Good Old Games Installer
slug: qube-directors-cut
runner: wine
year: 2011

script:
  files:
    - setup: N/A:Select setup file 

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/Q.U.B.E. Director's Cut/Launch Q.U.B.E. Director's Cut.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
    
    - task:
        app: dotnet40
        name: winetricks
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

