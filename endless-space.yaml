name: Endless Space
game_slug: endless-space
version: Windows Games Installer
slug: endless-space
runner: wine
year: 2012

script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/ENDLESS Space - Definitive Edition/Launch ENDLESS™ Space - Definitive Edition.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the Game installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
  
    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
