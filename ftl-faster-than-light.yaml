name: FTL - Faster Than Light
game_slug: ftl-faster-than-light
version: Windows Games Installer
slug: ftl-faster-than-light
runner: wine
year: 2012

script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/FTL Advanced Edition/FTLGame.exe
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
  
    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR