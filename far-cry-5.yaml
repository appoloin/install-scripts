name: Far Cry 5
game_slug: far-cry-5
version: Windows Installer
slug: far-cry-5-installer
runner: wine
year: 2018

script:
  game:
    exe: "$GAMEDIR/drive_c/Games/Far Cry 5/bin/FarCry5.exe"
    prefix: $GAMEDIR

  files:
    - game: N/A:Select installer.

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        app: dotnet471 win10
        name: winetricks
        prefix: $GAMEDIR

    - task:
        description: Installing
        executable: $game
        name: wineexec
        prefix: $GAMEDIR


  wine:
    overrides:
      atiadlxx: d
