name: Grid 2
game_slug: grid-2
version: Windows Installer
slug: grid-2
runner: wine
year: 2013

script:
  game:
    exe: $GAMEDIR/drive_c/Program Files (x86)/Codemasters/Grid 2 - Reloaded Edition/grid2.exe
    prefix: $GAMEDIR

  files:
    - game:  N/A:Select file exe
    - patch:  
        url: https://github.com/appoloin/Patches/raw/refs/heads/master/OtherGames/Grid2.7z
        filename:  Grid2.7z


  installer:
    - task:
        name: create_prefix
        install_mono: true
        install_gecko: false
        prefix: $GAMEDIR
 
    - task:
        app: dotnet35
        description: Running Winetricks
        name: winetricks
        prefix: $GAMEDIR  

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

    - execute:
        file: 7z
        args: x $patch -o"$GAMEDIR/drive_c/Program Files (x86)/Codemasters/Grid 2 - Reloaded Edition/" -ppassword -y

