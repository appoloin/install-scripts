name: Bad Mojo
game_slug: bad-mojo
version: Good Old Games Installer
slug: bad-mojo
runner: wine
year: 1996

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/Bad Mojo/Launch Bad Mojo.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

