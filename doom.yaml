name: Doom
game_slug: doom
version: Windows Games Installer
slug: doom
runner: wine
year: 2016

script:
  game:
    exe: $GAMEDIR/drive_c/Games/Doom 2016/DOOMx64vk.exe
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the game installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
  
    - task:
        app: mfc140
        description: Installing additional components
        name: winetricks
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

