name: Black Book
game_slug: black-book
version: Good Old Games Installer
slug: black-book
runner: wine
year: 2021
 
script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/Black Book/Launch Black Book.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer
    - DLC1: N/A:Select DLC1 installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

    - task:
        executable: $DLC1
        name: wineexec
        args: /SILENT 
        prefix: $GAMEDIR

