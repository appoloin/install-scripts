name:  The Escapists - The Walking Dead
game_slug: the-escapists-the-walking-dead
version: Good Old Games Installer
slug: the-escapists-the-walking-dead
runner: wine
year: 2015

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/The Escapists The Walking Dead/Launch The Escapists - The Walking Dead.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

