name: Lost Planet 3
game_slug: lost-planet-3
version: Good Old Games Installer
slug: lost-planet-3
runner: wine
year: 2013

script:
  files:
    - setup: N/A:Select setup file 

  game:
    exe: "$GAMEDIR/drive_c/Games/Lost Planet 3/Binaries/Win32/LP3Launcher.exe"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
    
    - task:
        app: dotnet40
        name: winetricks
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

