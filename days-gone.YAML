name:  Days Gone
game_slug: days-gone
version: Windows Games
slug: days-gone
runner: wine
year: 2019

script:
  game:
    exe: $GAMEDIR/drive_c/Games/Days Gone/BendGame/Binaries/Win64/DaysGone.exe
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select installer
    - DLC1: N/A:Select DLC1 installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

    - task:
        executable: $DLC1
        name: wineexec
        prefix: $GAMEDIR
