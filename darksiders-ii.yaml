name: Darksiders II 
game_slug: darksiders-ii
version: Good Old Games Installer
slug: darksiders-ii
runner: wine
year: 2012
 
script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/Darksiders 2/Launch Darksiders 2.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer
    - DLC1: N/A:Select DLC1 installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
    - task:
        executable: $DLC1
        args: /SILENT
        name: wineexec
        prefix: $GAMEDIR
