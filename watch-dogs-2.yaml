name: Watch Dogs 2
game_slug: watch-dogs-2
version: Windows Games Installer
slug: watch-dogs-2
runner: wine
year: 2016

script:
  game:
    exe: $GAMEDIR/drive_c/Games/Watch Dogs 2/bin/WatchDogs2.exe
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
  
    - task:
        app: dotnet40  xact xact_x64
        name: winetricks
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR