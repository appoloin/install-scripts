name: Rogue Legacy
game_slug: rogue-legacy
version: Good Old Games Installer
slug: rogue-legacy
runner: wine
year: 2013

script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/Rogue Legacy/Launch Rogue Legacy.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer


  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        app: dotnet35 xna40
        name: winetricks
        prefix: $GAMEDIR


    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

