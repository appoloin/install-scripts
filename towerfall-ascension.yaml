name: Towerfall Ascension
game_slug: towerfall-ascension
version: Good Old Games Installer
slug: towerfall-ascension
runner: wine
year: 2014

script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/Towerfall - Ascension/Launch Towerfall - Ascension.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select GOG installer
    - DLC1: N/A:Select DLC1 installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
 
    - task:
        executable: $DLC1
        name: wineexec
        args: /SILENT 
        prefix: $GAMEDIR
