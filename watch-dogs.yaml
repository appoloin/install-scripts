name: Watch Dogs
game_slug: watch-dogs
version: Windows Games Installer
slug: watch-dogs
runner: wine
year: 2014

script:
  game:
    exe: $GAMEDIR/drive_c/Program Files (x86)/Watch Dogs/bin/Watch_Dogs.exe
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
  
    - task:
        app: dotnet40  xact xact_x64
        name: winetricks
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR