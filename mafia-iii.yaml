name: Mafia III
game_slug: mafia-iii
version: Good Old Games Installer
slug: mafia-iii
runner: wine
year: 2016
 
script:
  game:
    exe: $GAMEDIR/drive_c/Program Files/Mafia III/mafia3.exe
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer
    - patch1:  
        url: https://github.com/appoloin/Patches/raw/refs/heads/master/Mafia/mafia-iii-patch.zip.001
        filename:  mafia-iii-patch.zip.001
    - patch2:  
        url: https://github.com/appoloin/Patches/raw/refs/heads/master/Mafia/mafia-iii-patch.zip.002
        filename:  mafia-iii-patch.zip.002

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        app: dotnet45 
        description: Installing DotNet40
        name: winetricks
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

    #Move Patch into one folder
    - merge:
        src: "$patch1"
        dst: "$CACHE"
    - merge:
        src: "$patch2"
        dst: "$CACHE"

    - execute:
        file: 7z
        args: x $CACHE/mafia-iii-patch.zip.001 -o" $GAMEDIR/drive_c/Program Files/Mafia III/" -ppassword -y

