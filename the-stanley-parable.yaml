name: The Stanley Parable
game_slug: the-stanley-parable
version: Good Old Games Installer
slug: the-stanley-parable
runner: wine
year: 2013

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/Games/The Stanley Parable Ultra Deluxe/The Stanley Parable Ultra Deluxe.exe"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

