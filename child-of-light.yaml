name: Child of Light
game_slug: child-of-light
version: Good Old Games Installer
slug: child-of-light
runner: wine
year: 2014

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/Games/Child of Light/ChildofLight.exe"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

