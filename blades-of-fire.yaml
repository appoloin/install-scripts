name: Vampire Survivors
game_slug: blades-of-fire
version: Windows Games Installer
slug: blades-of-fire
runner: wine
year: 2025

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/Games/Blades of Fire/Bin/BladesOfFire.exe"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

