name: Costume Quest 2
game_slug: costume-quest-2
version: Good Old Games Installer
slug: costume-quest-2
runner: wine
year: 2014

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/Costume Quest 2/Launch Costume Quest 2.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

