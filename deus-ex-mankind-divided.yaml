name: Deus Ex - Mankind Divided
game_slug: deus-ex-mankind-divided
version: Good Old Games Installer
slug: deus-ex-mankind-divided
runner: wine
year: 2016

script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/Deus Ex Mankind Divided/Launch Deus Ex - Mankind Divided.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select GOG installer
    - DLC1: N/A:Select DLC1 installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
 
    - task:
        executable: $DLC1
        name: wineexec
        args: /SILENT 
        prefix: $GAMEDIR
