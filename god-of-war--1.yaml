name: God of War
game_slug: god-of-war--1
version: Good Old Games Installer
slug: god-of-war--1
runner: wine
year: 2018

script:
  files:
    - setup: N/A:Select setup file 
    - DLC1: N/A:Select Patch 1 file
    - DLC2: N/A:Select Patch 2 file
    - DLC3: N/A:Select Patch 3 file 

  game:
    exe: "$GAMEDIR/drive_c/Games/God of War/GoW.exe"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
        
    - task:
        app: xact xact_x64
        description: Running Winetricks
        name: winetricks
        prefix: $GAMEDIR  

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
    - task:
        executable: $DLC1
        name: wineexec
        prefix: $GAMEDIR
    - task:
        executable: $DLC2
        name: wineexec
        prefix: $GAMEDIR
    - task:
        executable: $DLC3
        name: wineexec
        prefix: $GAMEDIR
