name: Spacebourne 2
game_slug: spacebourne-2
version: Windows Installer
slug: spacebourne-2
runner: wine
year: 2023

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/SpaceBourne 2/Launch SpaceBourne 2.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

