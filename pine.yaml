name: Pine
game_slug: pine
version: Good Old Games Installer
slug: pine
runner: wine
year: 2019
 
script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/Pine/Launch Pine.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
