name: Silent Age
game_slug: the-silent-age
version: Good Old Games Installer
slug: the-silent-age
runner: wine
year: 2012

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/The Silent Age/Launch The Silent Age.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

