name: Yooka-Laylee and the Impossible Lair
game_slug: yooka-laylee-and-the-impossible-lair
version: Good Old Games Installer
slug: yooka-laylee-and-the-impossible-lair
runner: wine
year: 2019
 
script:
  game:
    exe: $GAMEDIR/drive_c/OG Games/Yooka-Laylee and the Impossible Lair/Launch Yooka-Laylee and the Impossible Lair.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer
    - DLC1: N/A:Select DLC1 installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

    - task:
        executable: $DLC1
        name: wineexec
        args: /SILENT 
        prefix: $GAMEDIR
