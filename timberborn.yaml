name: Timberborn
game_slug: timberborn
version: Good Old Games Installer
slug: timberborn
runner: wine
year: 2021
 
script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/Timberborn/Launch Timberborn.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the GOG installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR
