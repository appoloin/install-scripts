name:  Dugeon of the Endless
game_slug: dungeon-of-the-endless
version: Good Old Games Installer
slug: dungeon-of-the-endless
runner: wine
year: 2014

script:
  files:
    - setup: N/A:Select setup file from GOG

  game:
    exe: "$GAMEDIR/drive_c/GOG Games/Dungeon of the Endless/Launch Dungeon of the ENDLESS™ - Definitive Edition.lnk"
    prefix: $GAMEDIR

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR

    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

