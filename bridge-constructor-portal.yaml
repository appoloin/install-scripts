name: Bridge Constructor Portal
game_slug: bridge-constructor-portal
version: Windows Games Installer
slug: bridge-constructor-portal
runner: wine
year: 2017

script:
  game:
    exe: $GAMEDIR/drive_c/GOG Games/Bridge Constructor Portal/Launch Bridge Constructor Portal.lnk
    prefix: $GAMEDIR

  files:
    - setup: N/A:Select the game installer
    - patch:  N/A:Select the DLC installer

  installer:
    - task:
        name: create_prefix
        install_mono: false
        install_gecko: false
        prefix: $GAMEDIR
  
    - task:
        executable: $setup
        name: wineexec
        prefix: $GAMEDIR

    - task:
        executable: $patch
        name: wineexec
        prefix: $GAMEDIR